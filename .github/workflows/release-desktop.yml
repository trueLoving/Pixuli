name: 发布 Pixuli Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本 (例如: 1.0.0)'
        required: true
        default: '1.0.0'
      platform:
        description: '选择要发布的平台'
        required: true
        type: choice
        options:
          - win
          - mac-x64
          - mac-arm64
          - all
        default: all
      is-publish:
        description: '是否进行发布操作'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  detect:
    name: 检测输入参数
    runs-on: ubuntu-latest
    outputs:
      do_win: ${{ steps.set.outputs.do_win }}
      do_mac_x64: ${{ steps.set.outputs.do_mac_x64 }}
      do_mac_arm64: ${{ steps.set.outputs.do_mac_arm64 }}
      target_branch: ${{ steps.set.outputs.target_branch }}
      version: ${{ steps.set.outputs.version }}
      is_publish: ${{ steps.set.outputs.is_publish }}
    steps:
      - name: 解析输入参数
        id: set
        shell: bash
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          BRANCH="${{ github.ref_name }}"
          VERSION="${{ github.event.inputs.version }}"
          IS_PUBLISH="${{ github.event.inputs.is-publish }}"

          DO_WIN=false
          DO_MAC_X64=false
          DO_MAC_ARM64=false

          if [[ "$PLATFORM" == "win" || "$PLATFORM" == "all" ]]; then DO_WIN=true; fi
          if [[ "$PLATFORM" == "mac-x64" || "$PLATFORM" == "all" ]]; then DO_MAC_X64=true; fi
          if [[ "$PLATFORM" == "mac-arm64" || "$PLATFORM" == "all" ]]; then DO_MAC_ARM64=true; fi

          echo "do_win=$DO_WIN" >> $GITHUB_OUTPUT
          echo "do_mac_x64=$DO_MAC_X64" >> $GITHUB_OUTPUT
          echo "do_mac_arm64=$DO_MAC_ARM64" >> $GITHUB_OUTPUT
          echo "target_branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_publish=$IS_PUBLISH" >> $GITHUB_OUTPUT

  build-win:
    name: 构建 Windows
    needs: detect
    if: needs.detect.outputs.do_win == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.target_branch }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: 提取版本号
        id: version
        shell: bash
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=v$VERSION-desktop" >> $GITHUB_OUTPUT

      - name: 更新 apps/pixuli 版本号
        shell: bash
        run: |
          cd apps/pixuli
          TARGET_VERSION="${{ steps.version.outputs.VERSION }}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            pnpm version "$TARGET_VERSION" --no-git-tag-version
          fi

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 workspace 包
        run: pnpm build:packages

      - name: 构建桌面应用 (Windows x64)
        shell: bash
        run: |
          cd apps/pixuli
          pnpm exec tsc
          pnpm exec vite build --mode desktop
          npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: pixuli-desktop-win-v${{ steps.version.outputs.VERSION }}
          path: |
            apps/pixuli/release/*.exe
            !apps/pixuli/release/*.blockmap
            !apps/pixuli/release/*.yml
          retention-days: 30

  build-mac-x64:
    name: 构建 macOS x64
    needs: detect
    if: needs.detect.outputs.do_mac_x64 == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.target_branch }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: 提取版本号
        id: version
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=v$VERSION-desktop" >> $GITHUB_OUTPUT

      - name: 更新 apps/pixuli 版本号
        run: |
          cd apps/pixuli
          TARGET_VERSION="${{ steps.version.outputs.VERSION }}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            pnpm version "$TARGET_VERSION" --no-git-tag-version
          fi

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 workspace 包
        run: pnpm build:packages

      - name: 构建桌面应用 (macOS x64)
        run: |
          cd apps/pixuli
          pnpm exec tsc
          pnpm exec vite build --mode desktop
          npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: pixuli-desktop-mac-x64-v${{ steps.version.outputs.VERSION }}
          path: |
            apps/pixuli/release/*.dmg
            !apps/pixuli/release/*.blockmap
            !apps/pixuli/release/*.yml
          retention-days: 30

  build-mac-arm64:
    name: 构建 macOS ARM64
    needs: detect
    if: needs.detect.outputs.do_mac_arm64 == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.target_branch }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: 提取版本号
        id: version
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=v$VERSION-desktop" >> $GITHUB_OUTPUT

      - name: 更新 apps/pixuli 版本号
        run: |
          cd apps/pixuli
          TARGET_VERSION="${{ steps.version.outputs.VERSION }}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            pnpm version "$TARGET_VERSION" --no-git-tag-version
          fi

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 workspace 包
        run: pnpm build:packages

      - name: 构建桌面应用 (macOS ARM64)
        run: |
          cd apps/pixuli
          pnpm exec tsc
          pnpm exec vite build --mode desktop
          npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: pixuli-desktop-mac-arm64-v${{ steps.version.outputs.VERSION }}
          path: |
            apps/pixuli/release/*.dmg
            !apps/pixuli/release/*.blockmap
            !apps/pixuli/release/*.yml
          retention-days: 30

  skip-release:
    needs: [detect, build-win, build-mac-x64, build-mac-arm64]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.detect.outputs.is_publish == 'false' &&
      (needs.build-win.result == 'success' || needs.build-win.result == 'skipped') &&
      (needs.build-mac-x64.result == 'success' || needs.build-mac-x64.result == 'skipped') &&
      (needs.build-mac-arm64.result == 'success' || needs.build-mac-arm64.result == 'skipped')
    steps:
      - run: echo "is-publish=false，构建产物已上传至 artifacts"

  prepare-release:
    needs: [detect, build-win, build-mac-x64, build-mac-arm64]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.detect.outputs.is_publish == 'true' &&
      (needs.build-win.result == 'success' || needs.build-win.result == 'skipped') &&
      (needs.build-mac-x64.result == 'success' || needs.build-mac-x64.result == 'skipped') &&
      (needs.build-mac-arm64.result == 'success' || needs.build-mac-arm64.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect.outputs.target_branch }}

      - name: 提取版本号
        id: version
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=v$VERSION-desktop" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 GitHub Release
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.TAG_VERSION }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，跳过创建"
          else
            gh release create "$TAG" \
              --title "Pixuli Desktop v${{ steps.version.outputs.VERSION }}" \
              --notes "Desktop release built from \`${{ needs.detect.outputs.target_branch }}\` without WASM (M1+ refactor). See CHANGELOG [Unreleased]."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Windows 构建产物
        if: needs.detect.outputs.do_win == 'true'
        shell: bash
        run: |
          find "artifacts/pixuli-desktop-win-v${{ steps.version.outputs.VERSION }}" -name "*.exe" -type f | while read -r file; do
            gh release upload "${{ steps.version.outputs.TAG_VERSION }}" "$file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 macOS x64 DMG
        if: needs.detect.outputs.do_mac_x64 == 'true'
        shell: bash
        run: |
          find "artifacts/pixuli-desktop-mac-x64-v${{ steps.version.outputs.VERSION }}" -name "*.dmg" -type f | while read -r file; do
            gh release upload "${{ steps.version.outputs.TAG_VERSION }}" "$file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 macOS ARM64 DMG
        if: needs.detect.outputs.do_mac_arm64 == 'true'
        shell: bash
        run: |
          find "artifacts/pixuli-desktop-mac-arm64-v${{ steps.version.outputs.VERSION }}" -name "*.dmg" -type f | while read -r file; do
            gh release upload "${{ steps.version.outputs.TAG_VERSION }}" "$file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
